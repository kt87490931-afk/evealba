server {
    listen 80;
    server_name 188.166.179.115;
    root /var/www/evealba;
    index index.php index.html;

    # Clean URL: /jobs/region/jobtype/name-ID -> jobs_view.php
    location ~ "^/jobs/[^/]+/[^/]+/[^/]+-(\d+)$" {
        try_files $uri /jobs_view.php?jr_id=$1&$query_string;
    }

    # Dynamic sitemap
    location = /sitemap.xml {
        try_files $uri /sitemap.php?$query_string;
    }

    location / {
        try_files $uri $uri/ /bbs/index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120;
    }

    location ~ /\. {
        deny all;
    }
}
